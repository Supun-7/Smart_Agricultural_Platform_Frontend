server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  gzip on;
  gzip_static on;
  gzip_vary on;
  gzip_proxied any;
  gzip_comp_level 6;
  gzip_min_length 1024;
  gzip_types
    text/plain
    text/css
    text/javascript
    application/javascript
    application/json
    application/xml
    application/rss+xml
    image/svg+xml
    font/ttf
    font/otf
    application/vnd.ms-fontobject;

  # Prevent stale app shell while still allowing immutable hashed assets.
  location = /index.html {
    add_header Cache-Control "no-cache, no-store, must-revalidate" always;
    add_header Pragma "no-cache" always;
    add_header Expires "0" always;
    try_files $uri =404;
  }

  # Serve precompressed assets when available. Brotli (.br) is preferred,
  # then gzip (.gz), then original file.
  location ~* ^/assets/.*\.js$ {
    default_type application/javascript;
    add_header Cache-Control "public, max-age=31536000, immutable" always;
    add_header Vary "Accept-Encoding" always;

    if ($http_accept_encoding ~* br) {
      add_header Content-Encoding br always;
      try_files $uri.br $uri =404;
      break;
    }

    if ($http_accept_encoding ~* gzip) {
      add_header Content-Encoding gzip always;
      try_files $uri.gz $uri =404;
      break;
    }

    try_files $uri =404;
  }

  location ~* ^/assets/.*\.css$ {
    default_type text/css;
    add_header Cache-Control "public, max-age=31536000, immutable" always;
    add_header Vary "Accept-Encoding" always;

    if ($http_accept_encoding ~* br) {
      add_header Content-Encoding br always;
      try_files $uri.br $uri =404;
      break;
    }

    if ($http_accept_encoding ~* gzip) {
      add_header Content-Encoding gzip always;
      try_files $uri.gz $uri =404;
      break;
    }

    try_files $uri =404;
  }

  location ~* ^/assets/.*\.svg$ {
    default_type image/svg+xml;
    add_header Cache-Control "public, max-age=31536000, immutable" always;
    add_header Vary "Accept-Encoding" always;

    if ($http_accept_encoding ~* br) {
      add_header Content-Encoding br always;
      try_files $uri.br $uri =404;
      break;
    }

    if ($http_accept_encoding ~* gzip) {
      add_header Content-Encoding gzip always;
      try_files $uri.gz $uri =404;
      break;
    }

    try_files $uri =404;
  }

  location /assets/ {
    expires 1y;
    add_header Cache-Control "public, immutable" always;
    try_files $uri =404;
  }

  location / {
    try_files $uri $uri/ /index.html;
  }
}
